<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reacties 2 – Reactietypen</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#1f2937;--muted:#6b7280;--accent:#2563eb;--line:#dbe3f0;--good:#15803d;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.wrap{max-width:980px;margin:0 auto;padding:16px}.topbar{position:sticky;top:0;z-index:5;background:#ffffffee;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar .inner{max-width:980px;margin:0 auto;padding:10px 16px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.brand{font-weight:700}.navlinks{display:flex;gap:8px;flex-wrap:wrap}.navlinks a,.btn{display:inline-block;padding:10px 14px;border-radius:10px;text-decoration:none;border:none;cursor:pointer;background:var(--accent);color:#fff;font-weight:600}
.navlinks a.secondary,.btn.secondary{background:#475569}.hero,.card,.result{background:var(--card);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.07);padding:18px;margin:14px 0}
.badge{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:4px 10px;border-radius:999px;font-size:13px;margin-bottom:8px}.theory{background:#eef5ff;border-left:4px solid var(--accent);padding:12px;border-radius:8px;margin-bottom:12px}
.small{font-size:14px;color:var(--muted)}.question{margin:16px 0 22px 0}.options label{display:block;margin:8px 0;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#f9fafb}.options label:hover{background:#eef2ff}
.feedback{margin-top:8px;font-weight:700}.feedback .solution{font-weight:400;margin-top:6px}.correct{color:var(--good)}.wrong{color:var(--bad)}
.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);width:0%}
.meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.scorebox{font-size:22px;font-weight:700}.chartbox{margin-top:10px;background:#fafcff;border:1px solid var(--line);border-radius:10px;padding:8px}
canvas.chart{width:100%;max-width:520px;height:240px;background:white;border:1px solid #e5e7eb;border-radius:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.tile{background:white;border-radius:14px;padding:16px;box-shadow:0 4px 14px rgba(0,0,0,.06)}.tile a{display:block;margin-top:10px;padding:10px 12px;border-radius:10px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600}
@media (max-width:640px){.wrap{padding:10px}.topbar .inner{padding:10px}.navlinks a,.btn{padding:9px 11px;font-size:14px}.hero,.card,.result{padding:14px}}
</style></head><body>
<div class="topbar"><div class="inner"><div class="brand">VWO 5 Scheikunde – Reacties 2 – Reactietypen</div><div class="navlinks"><a href="index.html">Home</a><a class="secondary" href="reacties_1_balanceren.html">Reacties 1 – Balanceren</a></div></div></div>
<div class="wrap"><div class="hero"><div class="badge">VWO 5 toetsniveau</div><h1 style="margin:4px 0 8px 0">Reacties 2 – Reactietypen</h1><p>Herken verbranding, ontleding, zuur-base en neerslagreacties.</p><div class="meta"><div class="small">Per keer worden <strong>10</strong> willekeurige vragen gekozen.</div><div class="small">Hoogste score: <strong id="bestScore">0</strong></div><div class="small">Tijd: <strong id="timer">00:00</strong></div></div><div style="margin-top:12px" class="progress"><div id="bar"></div></div></div>
<div id="quiz" class="card"></div><div class="result"><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn" onclick="checkQuiz()">Controleer antwoorden</button><button class="btn secondary" onclick="newSet()">Nieuwe set</button><button class="btn secondary" onclick="toggleTheory()">Toon/verberg theorie</button></div><div id="result" style="margin-top:14px"></div></div></div>
<script>
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickQuestions(pool,count,key){const saved=sessionStorage.getItem(key);if(saved){try{const ids=JSON.parse(saved);const chosen=ids.map(id=>pool.find(q=>q.id===id)).filter(Boolean);if(chosen.length===count)return chosen;}catch(e){}}
const chosen=shuffle(pool).slice(0,Math.min(count,pool.length));sessionStorage.setItem(key,JSON.stringify(chosen.map(q=>q.id)));return chosen;}
function drawChart(canvas,spec){if(!canvas||!spec)return;const ctx=canvas.getContext('2d');const w=canvas.width=520,h=canvas.height=240;ctx.clearRect(0,0,w,h);ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,15);ctx.lineTo(40,205);ctx.lineTo(500,205);ctx.stroke();ctx.fillStyle='#475569';ctx.font='12px Arial';ctx.fillText(spec.xlabel||'x',490,220);ctx.fillText(spec.ylabel||'y',8,20);
if(spec.type==='line'){const xs=spec.x||[],ys=spec.y||[];const minY=Math.min(...ys),maxY=Math.max(...ys),minX=Math.min(...xs),maxX=Math.max(...xs);const mapX=x=>40+(x-minX)/(maxX-minX||1)*450;const mapY=y=>205-(y-minY)/(maxY-minY||1)*170;ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.beginPath();xs.forEach((x,i)=>{const px=mapX(x),py=mapY(ys[i]);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);});ctx.stroke();ctx.fillStyle='#64748b';xs.forEach((x,i)=>{ctx.beginPath();ctx.arc(mapX(x),mapY(ys[i]),3,0,Math.PI*2);ctx.fill();});}
else if(spec.type==='bars'){const vals=spec.values||[];const maxV=Math.max(...vals,1);const bw=70;vals.forEach((v,i)=>{const x=70+i*110,bh=v/maxV*150;ctx.fillStyle=['#60a5fa','#2563eb','#93c5fd','#1d4ed8'][i%4];ctx.fillRect(x,205-bh,bw,bh);ctx.fillStyle='#475569';ctx.fillText((spec.labels||[])[i]||'',x+8,223);});}}

const questionPool=[{"id": "rt1", "theory": "Bij een verbrandingsreactie reageert een stof met zuurstof.", "q": "Welke reactie is een verbranding?", "options": ["2Mg + O₂ → 2MgO", "CaCO₃ → CaO + CO₂", "AgNO₃ + NaCl → AgCl + NaNO₃", "HCl + NaOH → NaCl + H₂O"], "answer": 0, "solution": "Magnesium reageert met zuurstof: dat is een verbranding."}, {"id": "rt2", "theory": "Bij ontleding valt één stof uiteen in meerdere stoffen.", "q": "Welke reactie is een ontleding?", "options": ["2H₂ + O₂ → 2H₂O", "CaCO₃ → CaO + CO₂", "NaOH + HCl → NaCl + H₂O", "Fe + CuSO₄ → FeSO₄ + Cu"], "answer": 1, "solution": "Één beginstof valt uiteen in twee producten."}, {"id": "rt3", "theory": "Bij een zuur-base-reactie reageren H⁺ en OH⁻ tot water.", "q": "Welke reactie is een zuur-base-reactie?", "options": ["NaCl + AgNO₃ → AgCl + NaNO₃", "HNO₃ + KOH → KNO₃ + H₂O", "Zn + 2HCl → ZnCl₂ + H₂", "2KClO₃ → 2KCl + 3O₂"], "answer": 1, "solution": "Zuur + base geeft zout en water."}, {"id": "rt4", "theory": "Bij een neerslagreactie ontstaat een slecht oplosbare stof.", "q": "Welke reactie is een neerslagreactie?", "options": ["BaCl₂ + Na₂SO₄ → BaSO₄ + 2NaCl", "C + O₂ → CO₂", "NH₃ + HCl → NH₄Cl", "2H₂O₂ → 2H₂O + O₂"], "answer": 0, "solution": "BaSO₄ is slecht oplosbaar en slaat neer."}, {"id": "rt5", "theory": "Bij substitutie verdringt een onedel metaal vaak een edeler metaalion.", "q": "Welke reactie is een substitutiereactie?", "options": ["Cu + O₂ → CuO", "Fe + CuSO₄ → FeSO₄ + Cu", "HCl + NaOH → NaCl + H₂O", "2NaN₃ → 2Na + 3N₂"], "answer": 1, "solution": "IJzer verdringt koper uit het zout."}, {"id": "rt6", "theory": "Synthese betekent dat meerdere stoffen samen één nieuw product vormen.", "q": "Welke reactie is een synthese?", "options": ["N₂ + 3H₂ → 2NH₃", "CaCO₃ → CaO + CO₂", "AgNO₃ + NaCl → AgCl + NaNO₃", "C₂H₅OH + O₂ → CO₂ + H₂O"], "answer": 0, "solution": "Twee beginstoffen vormen één productsoort."}, {"id": "rt7", "theory": "Niet elke reactie met zuurstof is een organische volledige verbranding.", "q": "Welke reactie is géén volledige verbranding van een koolwaterstof?", "options": ["CH₄ + 2O₂ → CO₂ + 2H₂O", "2Mg + O₂ → 2MgO", "C₃H₈ + 5O₂ → 3CO₂ + 4H₂O", "2C₂H₆ + 7O₂ → 4CO₂ + 6H₂O"], "answer": 1, "solution": "Dit is wel een verbranding, maar niet van een koolwaterstof naar CO₂ en H₂O."}, {"id": "rt8", "theory": "Een redoxreactie bevat elektronenoverdracht.", "q": "Welke reactie is zeker redox?", "options": ["HCl + NaOH → NaCl + H₂O", "AgNO₃ + NaCl → AgCl + NaNO₃", "Zn + Cu²⁺ → Zn²⁺ + Cu", "NH₄⁺ + OH⁻ → NH₃ + H₂O"], "answer": 2, "solution": "Zink staat elektronen af en koperionen nemen ze op."}, {"id": "rt9", "theory": "Bij precipitatie herken je vaak twee opgeloste zouten die ionen uitwisselen.", "q": "Welk product is het neerslag in AgNO₃ + NaCl → AgCl + NaNO₃?", "options": ["AgNO₃", "NaCl", "AgCl", "NaNO₃"], "answer": 2, "solution": "Zilverchloride is slecht oplosbaar."}, {"id": "rt10", "theory": "Zuur + carbonaat geeft zout, water en koolstofdioxide.", "q": "Welk reactietype hoort bij CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂?", "options": ["Alleen ontleding", "Alleen verbranding", "Zuur-reactie met gasvorming", "Alleen neerslagreactie"], "answer": 2, "solution": "Een zuur reageert met een carbonaat en er ontstaat CO₂."}];const STORAGE_KEY="reacties_2_reactietypen.html_best";const SESSION_KEY="reacties_2_reactietypen.html_set";let theoryVisible=true;let sec=0;setInterval(()=>{sec++;const m=String(Math.floor(sec/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');document.getElementById('timer').textContent=`${m}:${s}`; },1000);
const questions=pickQuestions(questionPool,10,SESSION_KEY);
function renderQuiz(){const quiz=document.getElementById('quiz');quiz.innerHTML=questions.map((q,idx)=>`<div class="question"><div class="theory" data-theory><strong>Theorie:</strong><br>${q.theory}</div><p><strong>Vraag ${idx+1}:</strong> ${q.q}</p>${q.chart?`<div class="chartbox"><canvas class="chart" id="chart${idx}"></canvas><div class="small">${q.chart.caption||''}</div></div>`:''}<div class="options">${q.options.map((o,j)=>`<label><input type="radio" name="q${idx}" value="${j}"> ${o}</label>`).join('')}</div><div id="feedback${idx}" class="feedback"></div></div>`).join('');questions.forEach((q,idx)=>{if(q.chart)drawChart(document.getElementById(`chart${idx}`),q.chart);});document.getElementById('bestScore').textContent=localStorage.getItem(STORAGE_KEY)||'0';}
function checkQuiz(){let score=0,answered=0;questions.forEach((q,idx)=>{const el=document.querySelector(`input[name="q${idx}"]:checked`);const fb=document.getElementById(`feedback${idx}`);if(!el){fb.innerHTML=`<span class="wrong">Nog niet ingevuld.</span><div class="solution">${q.solution}</div>`;return;}answered++;if(Number(el.value)===q.answer){score++;fb.innerHTML=`<span class="correct">Goed.</span><div class="solution">${q.solution}</div>`;}else{fb.innerHTML=`<span class="wrong">Niet goed.</span><div class="solution">${q.solution}</div>`;}});document.getElementById('bar').style.width=Math.round(answered/questions.length*100)+'%';const prev=Number(localStorage.getItem(STORAGE_KEY)||0);if(score>prev)localStorage.setItem(STORAGE_KEY,String(score));document.getElementById('bestScore').textContent=localStorage.getItem(STORAGE_KEY)||'0';let msg='Blijf oefenen.';if(score>=8)msg='Netjes. De basis staat goed.';if(score===questions.length)msg='Uitstekend. Alles goed.';document.getElementById('result').innerHTML=`<div class="scorebox">Score: ${score} / ${questions.length}</div><div>${msg}</div>`;}
function newSet(){sessionStorage.removeItem(SESSION_KEY);location.reload();}
function toggleTheory(){theoryVisible=!theoryVisible;document.querySelectorAll('[data-theory]').forEach(el=>el.style.display=theoryVisible?'block':'none');}
renderQuiz();</script></body></html>
