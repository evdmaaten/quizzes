<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exponentieel en ln 1 — Basis en e</title>

<style>

:root{
--bg:#f4f7fb;
--card:#ffffff;
--ink:#17324d;
--muted:#5f748a;
--line:#d8e2ee;
--brand:#2563eb;
--soft:#eaf2ff;
--ok:#15803d;
--bad:#b91c1c;
--shadow:0 10px 30px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
}

.page{
min-height:100vh;
display:flex;
justify-content:center;
align-items:stretch;
}

.quiz{
width:100%;
max-width:520px;
min-height:100vh;

background:
repeating-linear-gradient(
to bottom,
white 0px,
white 50px,
#dbe5f0 51px,
white 52px
);

display:flex;
flex-direction:column;
padding:18px 16px 20px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:14px;
}

.vraag{
font-size:2rem;
font-weight:900;
color:var(--brand);
}

.home{
border:3px solid var(--brand);
padding:10px 14px;
border-radius:12px;
text-decoration:none;
font-weight:700;
color:var(--brand);
background:white;
}

.box{

border:4px solid var(--brand);
border-radius:18px;
background:white;

overflow:hidden;

box-shadow:var(--shadow);

margin-bottom:18px;
}

.vraagtekst{

min-height:140px;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:22px;

font-size:1.3rem;
font-weight:800;

}

.theorieknop{

border:none;

border-top:4px solid var(--brand);

background:white;

padding:10px;

font-weight:900;

color:var(--brand);

cursor:pointer;

}

.theorie{

display:none;

padding:14px;

border-top:1px solid var(--line);

}

.theorie.open{

display:block;

}

.answers{

display:grid;

gap:12px;

}

.answer{

border:3px solid #9bb6db;

border-radius:18px;

background:white;

padding:16px;

font-size:1.05rem;

font-weight:700;

cursor:pointer;

}

.answer.selected{

border-color:var(--brand);

background:var(--soft);

}

.answer.correct{

border-color:var(--ok);

background:#ecfdf3;

}

.answer.wrong{

border-color:var(--bad);

background:#fef2f2;

}

.check{

margin-top:auto;

}

.check button{

width:100%;

border:4px solid var(--brand);

border-radius:18px;

background:white;

color:var(--brand);

font-size:1.2rem;

font-weight:900;

padding:16px;

cursor:pointer;

}

.feedback{

text-align:center;

font-weight:800;

margin:12px 0;

}

.ok{color:var(--ok)}

.bad{color:var(--bad)}

.nav{

display:grid;

grid-template-columns:60px 1fr 60px;

align-items:center;

margin-top:6px;

}

.nav button{

border:none;

background:none;

font-size:2rem;

color:var(--brand);

cursor:pointer;

}

.counter{

text-align:center;

font-weight:900;

color:var(--brand);

}

.result{

margin-top:10px;

background:white;

border:1px solid var(--line);

padding:10px;

border-radius:12px;

}

</style>

</head>

<body>

<div class="page">

<div class="quiz">

<div class="top">

<div class="vraag" id="vraagNr">Vraag 1</div>

<a class="home" href="wiskunde/index.html">Home</a>

</div>


<div class="box">

<div class="vraagtekst" id="vraagTekst"></div>

<button class="theorieknop" id="theorieBtn">THEORIE</button>

<div class="theorie" id="theorieTekst"></div>

</div>


<div class="answers" id="answers"></div>


<div class="check">

<button onclick="checkAntwoord()">CHECK ANTWOORD</button>

<div class="feedback" id="feedback"></div>

</div>


<div class="nav">

<button onclick="vorige()">◀</button>

<div class="counter" id="counter"></div>

<button onclick="volgende()">▶</button>

</div>


<div class="result">

Beste score:

<span id="best"></span>

<br>

Laatste score:

<span id="last"></span>

</div>

</div>

</div>


<script>


const NEXT_QUIZ = "exponentieel_2_ln.html";

const PREV_QUIZ = null;

const HOME_PAGE = "wiskunde/index.html";


const STORAGE_KEY="exp1";


const BANK=[

{
vraag:"Wat is e ongeveer?",
opties:["1","2.71","3.14","10"],
goed:1,
theorie:"Het getal e ≈ 2.718",
uitleg:"e is een belangrijk getal bij groei"
},

{
vraag:"Wat is e^0?",
opties:["0","1","e","niet gedefinieerd"],
goed:1,
theorie:"Elke macht 0 = 1",
uitleg:"dus e^0=1"
},

{
vraag:"Welke grafiek hoort bij e^x?",
opties:["stijgend","dalend","lijn","parabool"],
goed:0,
theorie:"e^x groeit snel",
uitleg:"exponentiële groei"
},

{
vraag:"Wat is e^1?",
opties:["0","1","2.71","10"],
goed:2,
theorie:"e^1=e",
uitleg:"≈2.71"
},

{
vraag:"Wat is e^-1?",
opties:["1/e","-e","e","0"],
goed:0,
theorie:"negatieve exponent",
uitleg:"1/e"
},

{
vraag:"Welke functie groeit sneller?",
opties:["x","x²","e^x","ln x"],
goed:2,
theorie:"exponentiële groei is snel",
uitleg:"e^x groeit snelst"
},

{
vraag:"Wat is ln(e)?",
opties:["0","1","e","10"],
goed:1,
theorie:"ln(e)=1",
uitleg:"log en exp zijn inverse"
},

{
vraag:"Wat is ln(1)?",
opties:["0","1","e","niet gedefinieerd"],
goed:0,
theorie:"e^0=1",
uitleg:"dus ln(1)=0"
},

{
vraag:"Wat is e^2 ongeveer?",
opties:["4","5","7.39","10"],
goed:2,
theorie:"e^2≈7.39",
uitleg:"rekenmachine"
}

];


let vragen=[];
let index=0;
let gekozen=[];
let nagekeken=[];
let locked=false;


function shuffle(a){

return a.sort(()=>Math.random()-0.5);

}


function start(){

vragen=shuffle(BANK).slice(0,8);

gekozen=new Array(vragen.length);

nagekeken=new Array(vragen.length);

index=0;

render();

}


function render(){

let q=vragen[index];

vraagNr.innerHTML="Vraag "+(index+1);

vraagTekst.innerHTML=q.vraag;

theorieTekst.innerHTML=q.theorie;

counter.innerHTML=(index+1)+" / "+vragen.length;


answers.innerHTML="";


q.opties.forEach((o,i)=>{

let b=document.createElement("div");

b.className="answer";

b.innerHTML=o;


if(gekozen[index]==i)

b.classList.add("selected");


if(nagekeken[index]){

if(i==q.goed)

b.classList.add("correct");

if(i==gekozen[index]&&i!=q.goed)

b.classList.add("wrong");

}


b.onclick=()=>{

if(nagekeken[index])return;

gekozen[index]=i;

render();

};


answers.appendChild(b);

});


}


function checkAntwoord(){

if(gekozen[index]==null){

feedback.innerHTML="kies antwoord";

feedback.className="feedback bad";

return;

}


nagekeken[index]=true;


let q=vragen[index];


if(gekozen[index]==q.goed){

feedback.innerHTML="goed";

feedback.className="feedback ok";

}else{

feedback.innerHTML="niet goed<br>"+q.uitleg;

feedback.className="feedback bad";

}


render();


if(nagekeken.every(v=>v)){

finish();

}

}


function finish(){

let score=0;


vragen.forEach((q,i)=>{

if(gekozen[i]==q.goed)score++;

});


localStorage.setItem(STORAGE_KEY+"_last",score+"/"+vragen.length);


let best=localStorage.getItem(STORAGE_KEY+"_best")||0;


if(score>best)

localStorage.setItem(STORAGE_KEY+"_best",score);


best.innerHTML=localStorage.getItem(STORAGE_KEY+"_best");

last.innerHTML=localStorage.getItem(STORAGE_KEY+"_last");


locked=true;

}


function volgende(){


if(index<vragen.length-1){

index++;

render();

return;

}


if(!nagekeken.every(v=>v)){

feedback.innerHTML="beantwoord alles";

feedback.className="feedback bad";

return;

}


if(NEXT_QUIZ)

window.location.href=NEXT_QUIZ;

else

window.location.href=HOME_PAGE;


}


function vorige(){


if(index>0){

index--;

render();

return;

}


if(PREV_QUIZ)

window.location.href=PREV_QUIZ;


}


theorieBtn.onclick=()=>{

theorieTekst.classList.toggle("open");

};


best.innerHTML=localStorage.getItem(STORAGE_KEY+"_best")||0;

last.innerHTML=localStorage.getItem(STORAGE_KEY+"_last")||"-";


start();


</script>


</body>

</html>
