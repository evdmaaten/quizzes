<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goniometrie 4 — Grafieken</title>
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#17324d; --muted:#5f748a; --line:#d8e2ee;
  --brand:#2563eb; --soft:#eaf2ff; --ok:#15803d; --bad:#b91c1c;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
}
body{min-height:100vh}
.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:stretch;
}
.quiz-shell{
  width:100%;
  max-width:520px;
  min-height:100vh;
  background:
    repeating-linear-gradient(
      to bottom,
      #fff 0px,
      #fff 50px,
      #dbe5f0 51px,
      #fff 52px
    );
  display:flex;
  flex-direction:column;
  padding:18px 16px 20px;
  overflow:hidden;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.vraag-label{
  font-size:2rem;
  font-weight:900;
  color:var(--brand);
}
.home-btn{
  border:3px solid var(--brand);
  border-radius:12px;
  padding:8px 14px;
  text-decoration:none;
  color:var(--brand);
  font-weight:800;
  background:#fff;
}
.question-box{
  border:4px solid var(--brand);
  border-radius:18px;
  background:white;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.question-main{
  padding:24px;
  text-align:center;
  font-size:1.35rem;
  font-weight:800;
  min-height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.theory-bar{
  border:none;
  border-top:4px solid var(--brand);
  padding:10px;
  background:white;
  font-weight:800;
  color:var(--brand);
  cursor:pointer;
  width:100%;
}
.theory-content{
  display:none;
  padding:14px;
  border-top:1px solid var(--line);
}
.theory-content.open{
  display:block;
}
.graph-wrap{
  display:none;
  margin:0 0 16px;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
  box-shadow:var(--shadow);
}
.graph-wrap.show{
  display:block;
}
canvas.graph{
  display:block;
  width:100%;
  height:220px;
}
.answers{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}
.answer{
  border:3px solid #9bb6db;
  border-radius:18px;
  padding:14px;
  background:white;
  cursor:pointer;
  font-weight:700;
  box-shadow:var(--shadow);
}
.answer.selected{
  border-color:var(--brand);
  background:var(--soft);
}
.answer.correct{
  border-color:var(--ok);
  background:#ecfdf3;
  color:#14532d;
}
.answer.wrong{
  border-color:var(--bad);
  background:#fef2f2;
  color:#7f1d1d;
}
.check-wrap{
  margin-top:auto;
}
.bottom-tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}
.tool-btn{
  border:2px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:var(--ink);
  font-size:.98rem;
  font-weight:800;
  padding:12px 10px;
  cursor:pointer;
}
.check-btn{
  width:100%;
  border:4px solid var(--brand);
  border-radius:18px;
  padding:16px;
  font-size:1.2rem;
  font-weight:900;
  background:white;
  color:var(--brand);
}
.feedback{
  min-height:42px;
  text-align:center;
  font-weight:800;
  margin:12px 0 10px;
}
.feedback.ok{color:var(--ok)}
.feedback.bad{color:var(--bad)}
.explanation{
  margin-top:6px;
  font-weight:400;
  color:var(--ink);
}
.nav-bottom{
  display:grid;
  grid-template-columns:60px 1fr 60px;
  align-items:center;
  margin-top:10px;
}
.nav-btn{
  font-size:2rem;
  border:none;
  background:none;
  color:var(--brand);
}
.counter{
  text-align:center;
  font-weight:800;
  color:var(--brand);
}
.meta{
  text-align:center;
  font-size:.9rem;
  color:var(--muted);
}
.result-panel{
  margin-top:10px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  box-shadow:var(--shadow);
  font-size:.9rem;
}
@media (min-width:800px){
  .page{padding:24px}
  .quiz-shell{
    min-height:calc(100vh - 48px);
    border-radius:28px;
    box-shadow:0 18px 50px rgba(0,0,0,.12);
  }
}
</style>
</head>
<body>
<div class="page">
  <main class="quiz-shell">

    <div class="topbar">
      <div class="vraag-label" id="vraagNummer">Vraag 1</div>
      <a class="home-btn" href="index.html">Home</a>
    </div>

    <section class="question-box">
      <div class="question-main" id="questionText"></div>
      <button class="theory-bar" id="toggleTheoryBtn" type="button">THEORIE</button>
      <div class="theory-content" id="theoryText"></div>
    </section>

    <div class="graph-wrap" id="graphWrap">
      <canvas class="graph" id="graphCanvas" width="800" height="220"></canvas>
    </div>

    <section class="answers" id="answersWrap"></section>

    <div class="check-wrap">
      <div class="bottom-tools">
        <button class="tool-btn" id="newQuizBtn" type="button">Nieuwe quiz</button>
        <button class="tool-btn" id="toggleExamBtn" type="button">Toetsmodus: uit</button>
      </div>

      <button class="check-btn" id="checkBtn" type="button">CHECK ANTWOORD</button>
      <div class="feedback" id="feedback"></div>

      <div class="nav-bottom">
        <button class="nav-btn" id="prevBtn" type="button">◀</button>
        <div>
          <div class="counter" id="counter">1 / 8</div>
          <div class="meta">Goniometrie • Grafieken</div>
          <div class="meta" id="subjectProgressText"></div>
        </div>
        <button class="nav-btn" id="nextBtn" type="button">▶</button>
      </div>

      <div class="result-panel">
        Beste score: <span id="bestScore">0</span><br>
        Laatste score: <span id="lastScore">—</span>
      </div>
    </div>

  </main>
</div>

<script>
const QUIZ_CONFIG = {
  storageKey:'goniometrie_4_grafieken',
  subjectKey:'goniometrie',
  subjectTotal:5,
  quizNumber:4,
  prevQuiz:'goniometrie_3_vergelijkingen.html',
  nextQuiz:'goniometrie_5_toepassingen.html',
  homePage:'index.html',
  roundSize:8,

  bank:[

    {
      prompt:'Wat is de amplitude van y = 3sin(x)?',
      options:['1', '2', '3', '6'],
      answer:2,
      theory:'De amplitude is de afstand van de middenlijn tot de top.',
      explanation:'Bij 3sin(x) is de amplitude 3.',
      graph:null
    },

    {
      prompt:'Wat is de periode van y = sin(x)?',
      options:['π', '2π', 'π/2', '4π'],
      answer:1,
      theory:'De sinusgrafiek herhaalt zich elke 2π.',
      explanation:'Dus de periode is 2π.',
      graph:null
    },

    {
      prompt:'Wat is de periode van y = cos(x)?',
      options:['π', '2π', 'π/2', '3π'],
      answer:1,
      theory:'Ook de cosinusgrafiek herhaalt zich elke 2π.',
      explanation:'Dus de periode is 2π.',
      graph:null
    },

    {
      prompt:'Wat is de amplitude van y = -2cos(x)?',
      options:['-2', '2', '1', '4'],
      answer:1,
      theory:'Amplitude is altijd positief en gelijk aan de grootte van de factor.',
      explanation:'Dus de amplitude is 2.',
      graph:null
    },

    {
      prompt:'Wat doet het minteken in y = -sin(x)?',
      options:[
        'Verschuift naar rechts',
        'Spiegelt in de x-as',
        'Maakt de periode korter',
        'Verschuift omhoog'
      ],
      answer:1,
      theory:'Een minteken voor de functie geeft spiegeling in de x-as.',
      explanation:'Dus de grafiek wordt gespiegeld in de x-as.',
      graph:null
    },

    {
      prompt:'Wat is de middenlijn van y = sin(x) + 2?',
      options:['y = 0', 'y = 1', 'y = 2', 'y = -2'],
      answer:2,
      theory:'Een verticale verschuiving verandert de middenlijn.',
      explanation:'Dus de middenlijn is y = 2.',
      graph:null
    },

    {
      prompt:'Wat doet y = sin(x) + 1 met de grafiek van sin(x)?',
      options:[
        '1 omhoog',
        '1 omlaag',
        '1 naar rechts',
        '1 naar links'
      ],
      answer:0,
      theory:'Optellen buiten de functie verschuift verticaal.',
      explanation:'Dus de grafiek gaat 1 omhoog.',
      graph:null
    },

    {
      prompt:'Wat gebeurt er met de periode bij y = sin(2x)?',
      options:[
        'Die wordt groter',
        'Die blijft gelijk',
        'Die wordt gehalveerd',
        'Die verdubbelt'
      ],
      answer:2,
      theory:'Een factor 2 binnenin maakt de grafiek horizontaal smaller.',
      explanation:'De periode wordt 2π/2 = π, dus gehalveerd.',
      graph:null
    },

    {
      prompt:'Welke grafiek begint bij x=0 met waarde 1?',
      options:['sin(x)', 'cos(x)', '-sin(x)', 'tan(x)'],
      answer:1,
      theory:'cos(0)=1 en sin(0)=0.',
      explanation:'Dus cos(x) begint bij 1.',
      graph:null
    },

    {
      prompt:'Welke grafiek gaat door de oorsprong?',
      options:['cos(x)', 'sin(x)', '1+cos(x)', '2+sin(x)'],
      answer:1,
      theory:'sin(0)=0 en cos(0)=1.',
      explanation:'Dus sin(x) gaat door de oorsprong.',
      graph:null
    }

  ]
};
</script>

<script src="js/quiz-flow.js?v=3"></script>
<script>
createQuizApp(QUIZ_CONFIG);
</script>

</body>
</html>
