<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Functies 5 — Modelleren</title>
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#17324d; --muted:#5f748a; --line:#d8e2ee;
  --brand:#2563eb; --soft:#eaf2ff; --ok:#15803d; --bad:#b91c1c;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
}
.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:stretch;
}
.quiz-shell{
  width:100%;
  max-width:520px;
  min-height:100vh;
  background:
    repeating-linear-gradient(
      to bottom,
      #fff 0px,
      #fff 50px,
      #dbe5f0 51px,
      #fff 52px
    );
  display:flex;
  flex-direction:column;
  padding:18px 16px 20px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}
.vraag-label{
  font-size:2rem;
  font-weight:900;
  color:var(--brand);
}
.home-btn{
  border:3px solid var(--brand);
  border-radius:12px;
  padding:8px 14px;
  text-decoration:none;
  color:var(--brand);
  font-weight:800;
  background:white;
}
.question-box{
  border:4px solid var(--brand);
  border-radius:18px;
  background:white;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.question-main{
  padding:24px;
  text-align:center;
  font-size:1.35rem;
  font-weight:800;
  min-height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.theory-bar{
  border:none;
  border-top:4px solid var(--brand);
  padding:10px;
  background:white;
  font-weight:800;
  color:var(--brand);
  cursor:pointer;
}
.theory-content{
  display:none;
  padding:14px;
  border-top:1px solid var(--line);
}
.theory-content.open{
  display:block;
}
.answers{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}
.answer{
  border:3px solid #9bb6db;
  border-radius:18px;
  padding:14px;
  background:white;
  cursor:pointer;
  font-weight:700;
}
.answer.selected{
  border-color:var(--brand);
  background:var(--soft);
}
.answer.correct{
  border-color:var(--ok);
  background:#ecfdf3;
}
.answer.wrong{
  border-color:var(--bad);
  background:#fef2f2;
}
.check-btn{
  width:100%;
  border:4px solid var(--brand);
  border-radius:18px;
  padding:16px;
  font-size:1.2rem;
  font-weight:900;
  background:white;
  color:var(--brand);
}
.nav-bottom{
  display:grid;
  grid-template-columns:60px 1fr 60px;
  align-items:center;
  margin-top:10px;
}
.nav-btn{
  font-size:2rem;
  border:none;
  background:none;
  color:var(--brand);
}
.counter{
  text-align:center;
  font-weight:800;
}
.meta{
  text-align:center;
  font-size:.9rem;
  color:var(--muted);
}
.result-panel{
  margin-top:10px;
  font-size:.9rem;
}
</style>
</head>

<body>
<div class="page">
<main class="quiz-shell">

<div class="topbar">
  <div class="vraag-label" id="vraagNummer">Vraag 1</div>
  <a class="home-btn" href="index.html">Home</a>
</div>

<section class="question-box">
  <div class="question-main" id="questionText"></div>
  <button class="theory-bar" id="toggleTheoryBtn">THEORIE</button>
  <div class="theory-content" id="theoryText"></div>
</section>

<section class="answers" id="answersWrap"></section>

<button class="check-btn" id="checkBtn">CHECK ANTWOORD</button>

<div id="feedback"></div>

<div class="nav-bottom">
  <button class="nav-btn" id="prevBtn">◀</button>
  <div>
    <div class="counter" id="counter">1 / 8</div>
    <div class="meta">Functies • Modelleren</div>
    <div class="meta" id="subjectProgressText"></div>
  </div>
  <button class="nav-btn" id="nextBtn">▶</button>
</div>

<div class="result-panel">
  Beste score: <span id="bestScore">0</span><br>
  Laatste score: <span id="lastScore">—</span>
</div>

</main>
</div>

<script>

</script>

</body>
</html>
