<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Differentiëren 3 — Maxima en minima</title>
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#17324d; --muted:#5f748a; --line:#d8e2ee;
  --brand:#2563eb; --soft:#eaf2ff; --ok:#15803d; --bad:#b91c1c; --shadow:0 10px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}
body{min-height:100vh}
.page{min-height:100vh;display:flex;justify-content:center;align-items:stretch}
.quiz-shell{
  width:100%;max-width:520px;min-height:100vh;
  background:repeating-linear-gradient(to bottom,#fff 0px,#fff 50px,#dbe5f0 51px,#fff 52px);
  display:flex;flex-direction:column;padding:18px 16px 20px;overflow:hidden
}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.vraag-label{font-size:clamp(1.9rem,6vw,2.6rem);font-weight:900;line-height:1;color:var(--brand);margin:6px 0 0}
.home-btn{
  display:inline-flex;align-items:center;justify-content:center;min-width:92px;padding:10px 14px;border:3px solid var(--brand);
  border-radius:12px;background:#fff;color:var(--brand);text-decoration:none;font-weight:800;font-size:1rem;box-shadow:var(--shadow)
}
.question-box{border:4px solid var(--brand);border-radius:18px;background:#fff;overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px}
.question-main{min-height:148px;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px 18px;font-size:clamp(1.25rem,4vw,1.6rem);font-weight:800;line-height:1.35}
.theory-bar{width:100%;border:none;border-top:4px solid var(--brand);background:#fff;padding:10px 14px;text-align:center;font-weight:900;font-size:1.1rem;color:var(--brand);cursor:pointer}
.theory-content{display:none;padding:14px 16px 16px;border-top:1px solid var(--line);font-size:1rem;line-height:1.5;background:#fdfefe}
.theory-content.open{display:block}
.graph-wrap{display:none;margin:0 0 16px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.graph-wrap.show{display:block}
canvas.graph{display:block;width:100%;height:220px}
.answers{display:grid;gap:12px;margin:8px 0 18px}
.answer{
  display:block;width:100%;border:3px solid #9bb6db;border-radius:18px;background:#fff;padding:16px 14px;text-align:left;
  font-size:1.08rem;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:var(--shadow)
}
.answer.selected{border-color:var(--brand);background:var(--soft)}
.answer.correct{border-color:var(--ok);background:#ecfdf3;color:#14532d}
.answer.wrong{border-color:var(--bad);background:#fef2f2;color:#7f1d1d}
.check-wrap{margin-top:auto;padding-top:6px}
.check-btn{
  width:100%;border:4px solid var(--brand);border-radius:18px;background:#fff;color:var(--brand);
  font-size:1.25rem;font-weight:900;padding:16px 14px;cursor:pointer;box-shadow:var(--shadow)
}
.feedback{min-height:42px;text-align:center;font-weight:800;margin:12px 0 10px;font-size:1rem}
.feedback.ok{color:var(--ok)} .feedback.bad{color:var(--bad)}
.explanation{margin-top:6px;font-weight:400;color:var(--ink)}
.bottom-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tool-btn{border:2px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:.98rem;font-weight:800;padding:12px 10px;cursor:pointer}
.nav-bottom{display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:12px;margin-top:4px}
.nav-btn{height:58px;border:none;background:transparent;color:var(--brand);font-size:2rem;font-weight:900;cursor:pointer;border-radius:14px}
.counter{text-align:center;font-size:1.25rem;font-weight:900;color:var(--brand)}
.meta{text-align:center;color:var(--muted);font-size:.95rem;margin-top:6px}
.result-panel{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);font-size:.98rem}
@media (min-width:800px){
  .page{padding:24px}
  .quiz-shell{min-height:calc(100vh - 48px);border-radius:28px;box-shadow:0 18px 50px rgba(0,0,0,.12)}
}
</style>
</head>
<body>
<div class="page">
  <main class="quiz-shell">
    <div class="topbar">
      <div class="vraag-label" id="vraagNummer">Vraag 1</div>
      <a class="home-btn" href="index.html">Home</a>
    </div>

    <section class="question-box">
      <div class="question-main" id="questionText"></div>
      <button class="theory-bar" id="toggleTheoryBtn" type="button">THEORIE</button>
      <div class="theory-content" id="theoryText"></div>
    </section>

    <div class="graph-wrap" id="graphWrap">
      <canvas class="graph" id="graphCanvas" width="800" height="220"></canvas>
    </div>

    <section class="answers" id="answersWrap"></section>

    <div class="check-wrap">
      <div class="bottom-tools">
        <button class="tool-btn" id="newQuizBtn" type="button">Nieuwe quiz</button>
        <button class="tool-btn" id="toggleExamBtn" type="button">Toetsmodus: uit</button>
      </div>

      <button class="check-btn" id="checkBtn" type="button">CHECK ANTWOORD</button>
      <div class="feedback" id="feedback"></div>

      <div class="nav-bottom">
        <button class="nav-btn" id="prevBtn" type="button" aria-label="Vorige vraag">◀</button>
        <div>
          <div class="counter" id="counter">1 / 8</div>
          <div class="meta">Differentiëren • Maxima en minima</div>
          <div class="meta" id="subjectProgressText"></div>
        </div>
        <button class="nav-btn" id="nextBtn" type="button" aria-label="Volgende vraag">▶</button>
      </div>

      <div class="result-panel">
        <strong>Beste score:</strong> <span id="bestScore">0</span><br>
        <strong>Laatste score:</strong> <span id="lastScore">—</span>
      </div>
    </div>
  </main>
</div>

<script>
const QUIZ_CONFIG = {
  storageKey: 'differentieren_3_extremen',
  subjectKey: 'differentieren',
  subjectTotal: 5,
  quizNumber: 3,
  prevQuiz: 'differentieren_2_tangenten.html',

  roundSize: 8,
  bank: [

    {

    {

      options: ['x=-1', 'x=0', 'x=1', 'x=2'],
      answer: 1,

    },

    {
      prompt: 'Gegeven f(x)=x². Wat is de minimumwaarde?',
      options: ['-1', '0', '1', '2'],
      answer: 1,
      theory: 'Vul x=0 in in de functie.',
      explanation: 'f(0)=0.',
      graph: null

    {
      prompt: 'Gegeven f(x)=-x². Welk type extreem punt heeft deze functie?',
      options: ['Minimum', 'Maximum', 'Geen extreem', 'Asymptoot'],
      answer: 1,

      explanation: 'Dus f’ verandert van - naar +.',

    {

      explanation: 'Dus f’ verandert van + naar -.',
      graph: null

    {
      prompt: 'Gegeven f(x)=x³-3x. Hoeveel kritieke punten heeft deze functie?',

    {
      prompt: 'Wat is het doel van een tekenschema van f’?',
      options: ['De afgeleide uitrekenen', 'Kijken waar de functie stijgt of daalt', 'De grafiek tekenen zonder functie', 'Nulpunten van f vinden'],

      explanation: 'Zo vind je maxima en minima.',
      graph: null
    }

  ]
};
</script>

<script src="js/quiz-flow.js?v=3"></script>
<script>
createQuizApp(QUIZ_CONFIG);
</script>
</body>
</html>
