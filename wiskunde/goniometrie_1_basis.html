<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goniometrie 1 — Basis</title>
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#17324d; --muted:#5f748a; --line:#d8e2ee;
  --brand:#2563eb; --soft:#eaf2ff; --ok:#15803d; --bad:#b91c1c;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
}
body{min-height:100vh}
.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:stretch;
}
.quiz-shell{
  width:100%;
  max-width:520px;
  min-height:100vh;
  background:
    repeating-linear-gradient(
      to bottom,
      #fff 0px,
      #fff 50px,
      #dbe5f0 51px,
      #fff 52px
    );
  display:flex;
  flex-direction:column;
  padding:18px 16px 20px;
  overflow:hidden;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.vraag-label{
  font-size:2rem;
  font-weight:900;
  color:var(--brand);
}
.home-btn{
  border:3px solid var(--brand);
  border-radius:12px;
  padding:8px 14px;
  text-decoration:none;
  color:var(--brand);
  font-weight:800;
  background:#fff;
}
.question-box{
  border:4px solid var(--brand);
  border-radius:18px;
  background:white;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.question-main{
  padding:24px;
  text-align:center;
  font-size:1.35rem;
  font-weight:800;
  min-height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.theory-bar{
  border:none;
  border-top:4px solid var(--brand);
  padding:10px;
  background:white;
  font-weight:800;
  color:var(--brand);
  cursor:pointer;
  width:100%;
}
.theory-content{
  display:none;
  padding:14px;
  border-top:1px solid var(--line);
}
.theory-content.open{
  display:block;
}
.graph-wrap{
  display:none;
  margin:0 0 16px;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
  box-shadow:var(--shadow);
}
.graph-wrap.show{
  display:block;
}
canvas.graph{
  display:block;
  width:100%;
  height:220px;
}
.answers{
  display:grid;
  gap:12px;
  margin-bottom:18px;
}
.answer{
  border:3px solid #9bb6db;
  border-radius:18px;
  padding:14px;
  background:white;
  cursor:pointer;
  font-weight:700;
  box-shadow:var(--shadow);
}
.answer.selected{
  border-color:var(--brand);
  background:var(--soft);
}
.answer.correct{
  border-color:var(--ok);
  background:#ecfdf3;
  color:#14532d;
}
.answer.wrong{
  border-color:var(--bad);
  background:#fef2f2;
  color:#7f1d1d;
}
.check-wrap{
  margin-top:auto;
}
.bottom-tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}
.tool-btn{
  border:2px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:var(--ink);
  font-size:.98rem;
  font-weight:800;
  padding:12px 10px;
  cursor:pointer;
}
.check-btn{
  width:100%;
  border:4px solid var(--brand);
  border-radius:18px;
  padding:16px;
  font-size:1.2rem;
  font-weight:900;
  background:white;
  color:var(--brand);
}
.feedback{
  min-height:42px;
  text-align:center;
  font-weight:800;
  margin:12px 0 10px;
}
.feedback.ok{color:var(--ok)}
.feedback.bad{color:var(--bad)}
.explanation{
  margin-top:6px;
  font-weight:400;
  color:var(--ink);
}
.nav-bottom{
  display:grid;
  grid-template-columns:60px 1fr 60px;
  align-items:center;
  margin-top:10px;
}
.nav-btn{
  font-size:2rem;
  border:none;
  background:none;
  color:var(--brand);
}
.counter{
  text-align:center;
  font-weight:800;
  color:var(--brand);
}
.meta{
  text-align:center;
  font-size:.9rem;
  color:var(--muted);
}
.result-panel{
  margin-top:10px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  box-shadow:var(--shadow);
  font-size:.9rem;
}
@media (min-width:800px){
  .page{padding:24px}
  .quiz-shell{
    min-height:calc(100vh - 48px);
    border-radius:28px;
    box-shadow:0 18px 50px rgba(0,0,0,.12);
  }
}
</style>
</head>
<body>
<div class="page">
  <main class="quiz-shell">

    <div class="topbar">
      <div class="vraag-label" id="vraagNummer">Vraag 1</div>
      <a class="home-btn" href="index.html">Home</a>
    </div>

    <section class="question-box">
      <div class="question-main" id="questionText"></div>
      <button class="theory-bar" id="toggleTheoryBtn" type="button">THEORIE</button>
      <div class="theory-content" id="theoryText"></div>
    </section>

    <div class="graph-wrap" id="graphWrap">
      <canvas class="graph" id="graphCanvas" width="800" height="220"></canvas>
    </div>

    <section class="answers" id="answersWrap"></section>

    <div class="check-wrap">
      <div class="bottom-tools">
        <button class="tool-btn" id="newQuizBtn" type="button">Nieuwe quiz</button>
        <button class="tool-btn" id="toggleExamBtn" type="button">Toetsmodus: uit</button>
      </div>

      <button class="check-btn" id="checkBtn" type="button">CHECK ANTWOORD</button>
      <div class="feedback" id="feedback"></div>

      <div class="nav-bottom">
        <button class="nav-btn" id="prevBtn" type="button">◀</button>
        <div>
          <div class="counter" id="counter">1 / 8</div>
          <div class="meta">Goniometrie • Basis</div>
          <div class="meta" id="subjectProgressText"></div>
        </div>
        <button class="nav-btn" id="nextBtn" type="button">▶</button>
      </div>

      <div class="result-panel">
        Beste score: <span id="bestScore">0</span><br>
        Laatste score: <span id="lastScore">—</span>
      </div>
    </div>

  </main>
</div>

<script>
const QUIZ_CONFIG = {

  subjectTotal:5,

  prevQuiz:null,

  roundSize:8,

  bank:[

    {
      prompt:'Welke drie basisfuncties horen bij de goniometrie?',

        'sin, cos en tan',

      ],
      answer:0,
      theory:'De drie bekendste goniometrische functies zijn sinus, cosinus en tangens.',
      explanation:'Dus sin, cos en tan.',

    {

      ],

      theory:'Goniometrie gaat over verbanden tussen hoeken en zijden.',
      explanation:'Dus vooral bij hoeken en driehoeken.',

        'overstaande / aanliggende zijde',

      ],
      answer:0,
      theory:'cos = aanliggende zijde / schuine zijde.',
      explanation:'Dus aanliggende gedeeld door schuine zijde.',
      graph:null

    {
      prompt:'Wat betekent tan in een rechthoekige driehoek?',
      options:[
        'overstaande / aanliggende zijde',

        'overstaande / schuine zijde',
        'schuine / overstaande zijde'

      answer:0,
      theory:'tan = overstaande zijde / aanliggende zijde.',
      explanation:'Dus overstaande gedeeld door aanliggende zijde.',
      graph:null
    },

    {
      prompt:'Welke zijde is in een rechthoekige driehoek altijd de langste?',

        'De overstaande zijde',
        'De aanliggende zijde',

      theory:'De schuine zijde ligt tegenover de rechte hoek en is het langst.',
      explanation:'Dus de schuine zijde.',
      graph:null

    {
      prompt:'Wanneer gebruik je tan vaak?',
      options:[
        'Als je overstaande en aanliggende zijde vergelijkt',

        'Alleen bij cirkels',
        'Nooit bij driehoeken'
      ],
      answer:0,
      theory:'tan koppelt overstaande en aanliggende zijde.',
      explanation:'Dus bij vergelijking van overstaande en aanliggende zijde.',
      graph:null
    },

    {
      prompt:'Wat is een hoek meestal in de basisgoniometrie op school?',
      options:[
        'Een verhouding tussen twee lijnen',
        'Een draaiing of opening tussen twee lijnen',
        'Een lengte',
        'Een oppervlakte'
      ],
      answer:1,
      theory:'Een hoek beschrijft hoe ver twee lijnen uit elkaar draaien.',
      explanation:'Dus een draaiing/opening tussen twee lijnen.',
      graph:null
    },

    {
      prompt:'Welke uitspraak klopt?',
      options:[
        'sin en cos zijn goniometrische functies',
        'sin en ln zijn hetzelfde',
        'tan is altijd groter dan 1',
        'cos is een lineaire functie'
      ],
      answer:0,
      theory:'Sinus en cosinus horen allebei bij de goniometrie.',
      explanation:'Dus die uitspraak klopt.',
      graph:null
    },

    {
      prompt:'Waarom is goniometrie nuttig?',
      options:[
        'Om verbanden met hoeken en periodiciteit te beschrijven',
        'Alleen om breuken te vermijden',
        'Alleen om parabolen te tekenen',
        'Omdat het altijd makkelijker is dan rekenen'
      ],
      answer:0,
      theory:'Goniometrie gebruik je bij hoeken, golven en periodieke verschijnselen.',
      explanation:'Dus voor hoeken en periodiciteit.',
      graph:null

  ]
};
</script>

<script src="js/quiz-flow.js?v=3"></script>
<script>
createQuizApp(QUIZ_CONFIG);
</script>

</body>
</html>
